<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cobweb</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06080a">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #06080a; --fog: #0d1117; --thread: rgba(180,190,200,0.07); --glow: rgba(160,200,255,0.12); }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Special Elite','Courier New',monospace; cursor: none; }
 body { position: fixed; inset: 0; }
 body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 80%,rgba(10,20,40,0.8) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at 80% 20%,rgba(5,15,30,0.8) 0%,transparent 70%),radial-gradient(ellipse 100% 100% at 50% 50%,#06080a 0%,#030507 100%); pointer-events: none; }
  #web-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #stage { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  .msg { position: absolute; max-width: min(420px,80vw); font-family: 'Special Elite',monospace; line-height: 1.55; pointer-events: none; opacity: 0; transition: opacity 0.9s ease,transform 0.9s ease; text-shadow: 0 0 20px currentColor; user-select: none; }
  .msg.visible { opacity: 1; }
  .msg.fading  { opacity: 0; transition: opacity 1.4s ease,transform 1.4s ease; }
  .msg.size-sm { font-size: clamp(13px,1.8vw,13px); }
  .msg.size-md { font-size: clamp(15px,2.2vw,16px); }
  .msg.size-lg { font-size: clamp(17px,2.8vw,20px); }
  .msg.size-xl { font-size: clamp(22px,4vw,28px); letter-spacing: 0.05em; }
  .msg.col-pale   { color: rgba(200,215,230,0.55); }
  .msg.col-silver { color: rgba(160,180,200,0.45); }
  .msg.col-cold   { color: rgba(140,195,220,0.50); }
  .msg.col-ghost  { color: rgba(220,220,240,0.35); }
  .msg.col-amber  { color: rgba(220,190,130,0.45); }
  .msg.col-blood  { color: rgba(190,60,60,0.55); }
  .msg.col-bright { color: rgba(230,240,255,0.80); }
  .msg.important { color: rgba(210,40,40,0.95) !important; text-shadow: 0 0 18px rgba(200,0,0,0.7),0 0 40px rgba(160,0,0,0.35); text-align: center; left: 50% !important; max-width: min(600px,90vw); letter-spacing: 0.06em; }
  #cursor { position: fixed; z-index: 100; width: 6px; height: 6px; border-radius: 50%; background: rgba(180,200,255,0.6); box-shadow: 0 0 12px rgba(180,200,255,0.4); pointer-events: none; transform: translate(-50%,-50%); }
  #scream-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px; background: radial-gradient(ellipse at center,rgba(60,0,0,0.97) 0%,rgba(10,0,0,0.99) 100%); opacity: 0; pointer-events: none; transition: opacity 1.2s ease; touch-action: manipulation; }
  #scream-overlay.active { opacity: 1; pointer-events: all; }
  #scream-text { font-family: 'Special Elite',monospace; font-size: clamp(22px,5vw,52px); color: #fff; text-align: center; max-width: min(760px,88vw); line-height: 1.4; letter-spacing: 0.04em; text-shadow: 0 0 30px rgba(255,60,60,0.9),0 0 80px rgba(200,0,0,0.5),0 0 160px rgba(160,0,0,0.25); opacity: 0; transform: scale(0.94); transition: opacity 1s ease 0.4s,transform 1s ease 0.4s; }
  #scream-overlay.active #scream-text { opacity: 1; transform: scale(1); }
  #scream-timer { font-family: 'Uncial Antiqua',serif; font-size: 11px; letter-spacing: 0.4em; color: rgba(200,80,80,0.4); text-transform: uppercase; opacity: 0; transition: opacity 0.5s ease 1s; }
  #scream-overlay.active #scream-timer { opacity: 1; }
  #scream-drain { position: absolute; bottom: 0; left: 0; height: 3px; width: 100%; background: linear-gradient(90deg,rgba(220,0,0,0.9) 0%,rgba(180,0,0,0.6) 100%); transform-origin: left; transform: scaleX(1); }
  #sigil { position: fixed; bottom: 22px; right: 24px; z-index: 10; font-family: 'Uncial Antiqua',serif; font-size: 11px; letter-spacing: 0.3em; color: rgba(140,160,180,0.2); text-transform: uppercase; pointer-events: none; }
  #listen-btn { position: fixed; bottom: 22px; left: 24px; z-index: 10; font-family: 'Uncial Antiqua',serif; font-size: 24px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(140,160,180,0.3); background: none; border: none; cursor: pointer; padding: 14px 8px; transition: color 0.6s ease; user-select: none; touch-action: manipulation; }  #listen-btn:hover { color: rgba(160,200,230,0.65); }
  #listen-btn.audio-on { color: rgba(160,200,230,0.55); text-shadow: 0 0 10px rgba(140,190,255,0.9),0 0 25px rgba(140,190,255,0.6),0 0 50px rgba(140,190,255,0.3); }
  #listen-btn.audio-on::before { content: '·'; margin-right: 6px; animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
 /* ── Echoes Button ── */
#echoes-btn {
  position: fixed;
  bottom: 22px;
  left: 50%;
transform: translateX(-50%);
  z-index: 10;
  font-family: 'Uncial Antiqua', serif;
  font-size: 24px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(140, 160, 180, 0.3);
  background: none;
  border: none;
  min-width: 64px;
  min-height: 44px;
  padding: 14px 8px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  cursor: pointer;
  user-select: none;
  transition: color 0.6s ease, text-shadow 0.6s ease;
  /* needed so the ::after dot positions relative to the button */
}
#echoes-btn.active {
  color: rgba(190, 140, 210, 0.75);
  text-shadow:
    0 0 10px rgba(180, 100, 255, 0.5),
    0 0 25px rgba(180, 100, 255, 0.25);
}
/* Pulse dot — appears when a new scream is logged */
#echoes-btn.has-new::after {
  content: '';
  position: absolute;
  top: 10px;
  right: 4px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(200, 80, 255, 0.9);
  box-shadow: 0 0 8px rgba(200, 80, 255, 0.8);
  animation: echoes-pulse 1.6s ease-in-out infinite;
}
@keyframes echoes-pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50%       { opacity: 1;   transform: scale(1.2); }
}

/* ── Backdrop (tap-outside-to-close) ── */
#echoes-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 40;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#echoes-backdrop.active { display: block; }

/* ── Echoes Panel ── */
#echoes-panel {
  position: fixed;
  bottom: 70px;
  left: 50%;
  z-index: 50;
  width: min(340px, calc(100vw - 32px));
  padding: 20px 22px calc(20px + env(safe-area-inset-bottom, 0px)) 22px;
  background: rgba(6, 4, 12, 0.94);
  border: 1px solid rgba(160, 100, 200, 0.15);
  box-shadow:
    0 0 40px rgba(100, 0, 150, 0.15),
    inset 0 0 20px rgba(0, 0, 0, 0.3);
  font-family: 'Special Elite', monospace;
  -webkit-overflow-scrolling: touch;
  overflow-y: auto;
  max-height: 60vh;
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%) translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
#echoes-panel.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
#echoes-title {
  font-family: 'Uncial Antiqua', serif;
  font-size: 11px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(180, 140, 200, 0.4);
  margin-bottom: 16px;
  border-bottom: 1px solid rgba(160, 100, 200, 0.1);
  padding-bottom: 10px;
}

/* ── Echo entries — bleed-in animation ── */
.echo-entry {
  margin-bottom: 16px;
  border-left: 1px solid rgba(160, 100, 200, 0.25);
  padding-left: 12px;
  /* start hidden — JS adds .echo-visible to trigger the animation */
  opacity: 0;
  transform: translateY(5px);
}
.echo-entry.echo-visible {
  animation: echo-bleed 0.7s ease forwards;
}
/* Each entry is slightly more faded than the last — oldest = most distant */
.echo-entry:nth-child(1) { --echo-final-opacity: 1.0; }
.echo-entry:nth-child(2) { --echo-final-opacity: 0.6; }
.echo-entry:nth-child(3) { --echo-final-opacity: 0.3; }

@keyframes echo-bleed {
  0%   { opacity: 0;                         transform: translateY(6px); }
  40%  { opacity: var(--echo-final-opacity); transform: translateY(-2px); }
  70%  { opacity: calc(var(--echo-final-opacity) * 0.85); transform: translateY(1px); }
  100% { opacity: var(--echo-final-opacity); transform: translateY(0); }
}
.echo-time {
  display: block;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(160, 100, 200, 0.5);
  margin-bottom: 5px;
  font-family: 'Uncial Antiqua', serif;
}
.echo-msg {
  display: block;
  font-size: 14px;
  color: rgba(215, 195, 235, 0.85);
  text-shadow: 0 0 12px rgba(180, 100, 255, 0.2);
  line-height: 1.55;
}
.echo-empty {
  font-size: 13px;
  color: rgba(160, 140, 180, 0.3);
  font-style: italic;
  letter-spacing: 0.1em;
  text-align: center;
  padding: 10px 0;
}

/* ── Notification banner ── */
#notif-banner {
  position: fixed;
  top: -80px;
  left: 0; right: 0;
  z-index: 9999;
  background: rgba(160, 0, 0, 0.92);
  color: rgba(255, 230, 230, 0.95);
  text-align: center;
  padding: 18px 24px;
  font-family: 'Special Elite', monospace;
  font-size: 15px;
  letter-spacing: 0.12em;
  cursor: pointer;
  touch-action: manipulation;
  transition: top 0.4s ease;
  text-shadow: 0 0 12px rgba(255,100,100,0.5);
}
#notif-banner.active { top: 0; }

 /* ── Vision overlay ── */
#vision-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(0,10,40,1) 0%, rgba(0,0,15,1) 100%);;
  opacity: 0; pointer-events: none;
  transition: opacity 1.2s ease;
}
#vision-overlay.active { opacity: 1; pointer-events: all; }
#vision-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  filter: contrast(1.1) brightness(0.9);
}

 /* ── Countdown ── */
#countdown {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 50;
  font-family: 'Uncial Antiqua', serif;
  font-size: clamp(28px, 6vw, 52px);
  letter-spacing: 0.15em;
  color: rgba(180, 200, 220, 0.35);
  text-shadow: 0 0 20px rgba(140, 180, 255, 0.15);
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}
#countdown.active { opacity: 1; }
#countdown-label {
  font-size: clamp(11px, 1.5vw, 14px);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(180, 200, 220, 0.25);
  text-align: center;
  margin-top: 10px;
} 
</style>
</head>
<body>
<canvas id="web-canvas"></canvas>
<div id="stage"></div>
<div id="cursor"></div>
<div id="sigil">cobweb</div>
<button id="listen-btn">listen</button>

 <!-- Echo button stuff -->
 <button id="echoes-btn" aria-label="View past screams">echoes</button>

<div id="echoes-panel" role="dialog" aria-label="Past screams">
  <div id="echoes-title">the web remembers</div>
  <div id="echoes-list"></div>
</div>

<div id="echoes-backdrop"></div>
 
<!-- Notification banner stuff -->
<div id="notif-banner">tap to receive transmission</div>
 <!-- Countdown -->
<div id="countdown">
  <div id="countdown-time"></div>
  <div id="countdown-label"></div>
</div>
<!-- Vision flash -->
<div id="vision-overlay">
  <img id="vision-img" src="" alt="" />
</div>
<div id="scream-overlay">
  <div id="scream-text"></div>
  <div id="scream-timer">fading in 30 seconds</div>
  <div id="scream-drain"></div>
</div>
<script>
'use strict';

const SHEET_CSV_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGPc7hKXGZ1FKR8E0Vnks6W0NdTVB00eaR6C4Tqi_cqVSwOLZYwIjs1yeCym_p3se6kN7JyVqc5ZXp/pub?gid=0&single=true&output=csv';
const AUDIO_CSV_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGPc7hKXGZ1FKR8E0Vnks6W0NdTVB00eaR6C4Tqi_cqVSwOLZYwIjs1yeCym_p3se6kN7JyVqc5ZXp/pub?gid=2041856543&single=true&output=csv';

const SCREAM_DURATION_MS = 30000;
const SCREAM_POLL_MS     = 3000;
const AUDIO_VOLUME       = 0.18;
const AUDIO_MIN_GAP_MS   = 10000;
const AUDIO_MAX_GAP_MS   = 15000;
const AMBIENT_URL = '/audio/Ambientlong.mp3';
const AMBIENT_VOLUME = 0.08;
const NOTIF_SOUND_URL = 'https://www.dropbox.com/scl/fi/3bc5wshigba9axgs37306/102308_1306869-lq.mp3?rlkey=b9y9uo999h6fp4gkn1r3htr33&st=6wcw4swl&raw=1';
 
let MESSAGES           = ["the signal is lost","no messages found","the feed is empty","waiting for transmission","this is a test"];
let IMPORTANT_MESSAGES = ["connection failed"];
let AUDIO_FILE_IDS     = [];

// ── Web canvas ─────────────────────────────────────────────
const webCanvas = document.getElementById('web-canvas');
const wCtx = webCanvas.getContext('2d');
let nodes = [];

function resizeWeb() { webCanvas.width = window.innerWidth; webCanvas.height = window.innerHeight; buildWeb(); }

function buildWeb() {
  const W = webCanvas.width, H = webCanvas.height;
  nodes = [];
  const anchors = [[0,0],[W*.3,0],[W*.6,0],[W,0],[W,H*.3],[W,H*.7],[W,H],[W*.7,H],[W*.35,H],[0,H],[0,H*.65],[0,H*.3],[W*.22,H*.18],[W*.75,H*.22],[W*.15,H*.7],[W*.8,H*.75],[W*.5,H*.5]];
  anchors.forEach(([x,y]) => nodes.push({x,y}));
  wCtx.clearRect(0,0,W,H);
  for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
    const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, dist=Math.hypot(dx,dy);
    if (dist < W*.45) {
      const alpha=(1-dist/(W*.45))*.09;
      wCtx.strokeStyle=`rgba(160,180,210,${alpha})`; wCtx.lineWidth=.6; wCtx.beginPath();
      const mx=(nodes[i].x+nodes[j].x)/2+(Math.random()-.5)*40, my=(nodes[i].y+nodes[j].y)/2+(Math.random()-.5)*40;
      wCtx.moveTo(nodes[i].x,nodes[i].y); wCtx.quadraticCurveTo(mx,my,nodes[j].x,nodes[j].y); wCtx.stroke();
    }
  }
  nodes.forEach(n => { wCtx.beginPath(); wCtx.arc(n.x,n.y,1.2,0,Math.PI*2); wCtx.fillStyle='rgba(180,200,230,0.18)'; wCtx.fill(); });
}
window.addEventListener('resize', resizeWeb);

// ── Message spawner ────────────────────────────────────────
const stage = document.getElementById('stage');
const SIZES=['size-sm','size-sm','size-md','size-md','size-md','size-lg','size-xl'];
const COLORS=['col-pale','col-silver','col-cold','col-ghost','col-amber','col-blood','col-bright'];
const COLOR_WEIGHTS=[4,4,4,3,2,1,1];

function pickColor() { const t=COLOR_WEIGHTS.reduce((a,b)=>a+b,0); let r=Math.random()*t; for(let i=0;i<COLORS.length;i++){r-=COLOR_WEIGHTS[i];if(r<=0)return COLORS[i];}return COLORS[0]; }
function calcDuration(t) { return Math.min(14000,Math.max(5000,t.length*120)); }
function randomPos() { const m=0.08; return {x:m+Math.random()*(1-m*2),y:m+Math.random()*(1-m*2)}; }

let usedMessages=[];
function pickMessage() { if(usedMessages.length>=MESSAGES.length)usedMessages=[]; const r=MESSAGES.filter(m=>!usedMessages.includes(m)); const m=r[Math.floor(Math.random()*r.length)]; usedMessages.push(m); return m; }

function spawnMessage() {
  const text=pickMessage(), pos=randomPos(), size=SIZES[Math.floor(Math.random()*SIZES.length)], color=pickColor(), duration=calcDuration(text), rot=(Math.random()-.5)*4;
  const el=document.createElement('div'); el.className=`msg ${size} ${color}`; el.textContent=text;
  el.style.left=(pos.x*100)+'%'; el.style.top=(pos.y*100)+'%'; el.style.transform=`rotate(${rot}deg) translateY(6px)`;
  stage.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.transform=`rotate(${rot}deg) translateY(0)`; el.classList.add('visible'); }));
  setTimeout(()=>{ el.classList.remove('visible'); el.classList.add('fading'); el.style.transform=`rotate(${rot}deg) translateY(-5px)`; setTimeout(()=>el.remove(),1500); },duration);
}

let usedImportant=[];
function pickImportant() { if(usedImportant.length>=IMPORTANT_MESSAGES.length)usedImportant=[]; const r=IMPORTANT_MESSAGES.filter(m=>!usedImportant.includes(m)); const m=r[Math.floor(Math.random()*r.length)]; usedImportant.push(m); return m; }

function spawnImportant() {
  if(!IMPORTANT_MESSAGES.length)return;
  const text=pickImportant(), duration=calcDuration(text)*1.4, yPct=(0.15+Math.random()*0.65)*100;
  const el=document.createElement('div'); el.className='msg size-lg important'; el.textContent=text;
  el.style.top=yPct+'%'; el.style.transform='translateX(-50%) translateY(6px)';
  stage.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.transform='translateX(-50%) translateY(0)'; el.classList.add('visible'); }));
  setTimeout(()=>{ el.classList.remove('visible'); el.classList.add('fading'); el.style.transform='translateX(-50%) translateY(-5px)'; setTimeout(()=>el.remove(),1500); },duration);
}

function scheduleNextImportant() { setTimeout(()=>{ spawnImportant(); scheduleNextImportant(); },8000+Math.random()*10000); }
function scheduleNext() { setTimeout(()=>{ spawnMessage(); scheduleNext(); },800+Math.random()*2700); }

// ── Audio engine ───────────────────────────────────────────
let audioEnabled=false, shuffledIds=[], currentAudio=null, ambientAudio=null, iosUnlockedAudio=null, iosNotifAudio=null;
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function nextFileId() { if(!shuffledIds.length)shuffledIds=shuffle(AUDIO_FILE_IDS); return shuffledIds.pop(); }
function driveUrl(id) { return id; }
function playNextClip() {
  if(!audioEnabled||!AUDIO_FILE_IDS.length)return;
  const id=nextFileId(); if(!id)return;
 if(currentAudio){currentAudio.pause();currentAudio.src='';currentAudio=null;}
const audio = iosUnlockedAudio || new Audio();
audio.src = driveUrl(id); audio.volume=AUDIO_VOLUME; currentAudio=audio;
audio.play().catch(()=>{});
  setTimeout(()=>{ if(audioEnabled)playNextClip(); },AUDIO_MIN_GAP_MS+Math.random()*(AUDIO_MAX_GAP_MS-AUDIO_MIN_GAP_MS));
}

const listenBtn=document.getElementById('listen-btn');
listenBtn.addEventListener('click',()=>{
 if (!iosUnlockedAudio) {
  iosUnlockedAudio = new Audio();
  iosUnlockedAudio.play().catch(() => {});
}
if (!iosNotifAudio && NOTIF_SOUND_URL) {
  iosNotifAudio = new Audio(NOTIF_SOUND_URL);
  iosNotifAudio.volume = 0.6;
  iosNotifAudio.play().catch(() => {});
  iosNotifAudio.pause();
  iosNotifAudio.currentTime = 0;
}
 localStorage.setItem('cobweb_welcomed', '1')
const hint = document.getElementById('first-hint')
if (hint) hint.remove()
  audioEnabled=!audioEnabled;
  listenBtn.classList.toggle('audio-on',audioEnabled);
  listenBtn.textContent=audioEnabled?'listening':'listen';
 requestNotifPermission()
  if(audioEnabled){
    playNextClip();
    if(AMBIENT_URL){
      ambientAudio=new Audio(AMBIENT_URL);
ambientAudio.volume=AMBIENT_VOLUME;
ambientAudio.loop=true;
ambientAudio.addEventListener('ended', () => {
  if (ambientAudio) {
    ambientAudio.currentTime = 0;
    ambientAudio.play().catch(()=>{});
  }
});
ambientAudio.play().catch(()=>{});
    }
  } else {
    if(currentAudio){currentAudio.pause();currentAudio.src='';currentAudio=null;}
    if(ambientAudio){ambientAudio.pause();ambientAudio.src='';ambientAudio=null;}
  }
});


const notifBanner = document.getElementById('notif-banner')
let notifQueue = []
let pendingNotifSound = null

function showNotif(message) { queueNotif('scream', message) }
function showVisionNotif(url) { queueNotif('vision', url) }

function queueNotif(type, payload) {
  if (type === 'scream') {
    addToHistory(payload)
    echoesBtn.classList.add('has-new')
  }
  notifQueue.push({ type, payload })
  if (notifQueue.length === 1) showNextNotif()
}

function showNextNotif() {
  if (!notifQueue.length) return
  const { type, payload } = notifQueue[0]
  notifBanner.textContent = type === 'scream' ? 'the web calls' : 'a vision approaches'
  notifBanner.classList.add('active')
  if (navigator.vibrate) navigator.vibrate([100, 50, 200])
  sendSystemNotif(type === 'scream' ? payload : 'a vision approaches')
if (iosNotifAudio || NOTIF_SOUND_URL) {
    const notifSound = iosNotifAudio || new Audio(NOTIF_SOUND_URL)
    notifSound.currentTime = 0
    notifSound.volume = 0.6
    notifSound.play().catch(() => {})
    pendingNotifSound = notifSound
    notifSound.addEventListener('ended', () => {
      if (pendingNotifSound) setTimeout(() => {
        if (pendingNotifSound) { pendingNotifSound.currentTime = 0; pendingNotifSound.play().catch(() => {}) }
      }, 4000)
    })
  }
}
 
function clearNotif() {
  notifQueue.shift()
  notifBanner.classList.remove('active')
  if (pendingNotifSound) { pendingNotifSound.pause(); pendingNotifSound = null }
  if (notifQueue.length > 0) setTimeout(showNextNotif, 600)
}

function handleNotifTap() {
  if (!notifQueue.length) return
  const { type, payload } = notifQueue[0]
  clearNotif()
  if (type === 'scream') showScream(payload)
  else showVision(payload)
}

notifBanner.addEventListener('click', handleNotifTap)

// ── Scream overlay ─────────────────────────────────────────
const screamOverlay=document.getElementById('scream-overlay'), screamText=document.getElementById('scream-text'), screamDrain=document.getElementById('scream-drain');
let screamActive=false, screamDrainAnim=null;

function showScream(message) {
  if(screamActive)return; screamActive=true; screamText.textContent=message;
  countdownEl.style.visibility = 'hidden';
  screamDrain.style.transition='none'; screamDrain.style.transform='scaleX(1)';
  screamOverlay.classList.add('active');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ screamDrain.style.transition=`transform ${SCREAM_DURATION_MS}ms linear`; screamDrain.style.transform='scaleX(0)'; }));
  screamDrainAnim=setTimeout(dismissScream,SCREAM_DURATION_MS);
}
function dismissScream() { screamOverlay.classList.remove('active'); countdownEl.style.visibility = ''; setTimeout(()=>{screamText.textContent='';screamActive=false;},1300); }
function handleScreamTap() { if(!screamActive)return; clearTimeout(screamDrainAnim); dismissScream(); }
screamOverlay.addEventListener('click', handleScreamTap);

// ── Scream poller — now routes to notif, not direct show ───
let screamFirstPoll=true, lastScreamTs=0;

function pollScream() {
  fetch(SCRIPT_URL + '?type=scream&t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (!data.ts || !data.message) return
      if (screamFirstPoll) { lastScreamTs = data.ts; screamFirstPoll = false; return }
      if (data.ts > lastScreamTs) { lastScreamTs = data.ts; showNotif(data.message) }
    })
    .catch(() => {})
}

function startScreamPoller() {
  pollScream()
  setInterval(pollScream, SCREAM_POLL_MS)
}

 // ── CSV parsers ────────────────────────────────────────────
function parseCSV(text) {
  const rows=text.trim().split('\n'), regular=[], important=[];
  for(const row of rows){
    const cols=row.split(/[\t,]/).map(c=>c.replace(/^"|"$/g,'').trim());
    const type=(cols[0]||'').toLowerCase(), msg=cols[1]||''; if(!msg)continue;
    if(type==='important')important.push(msg); else regular.push(msg);
  }
  return {regular,important};
}
function parseAudioCSV(text) { return text.trim().split('\n').map(r=>r.replace(/^"|"$/g,'').trim()).filter(id=>id.length>10); }

function loadMessagesFromSheet() {
  if(!SHEET_CSV_URL||SHEET_CSV_URL==='YOUR_GOOGLE_SHEETS_CSV_URL_HERE') return Promise.resolve();
  return fetch(SHEET_CSV_URL+'&t='+Date.now())
    .then(r=>{ if(!r.ok)throw new Error('messages fetch failed'); return r.text(); })
    .then(text=>{
      const {regular,important}=parseCSV(text);
      if(regular.length) MESSAGES=regular;
      if(important.length) IMPORTANT_MESSAGES=important;
      // save to localStorage after every successful fetch
      localStorage.setItem('cobweb_messages', JSON.stringify({regular, important}));
    })
    .catch(()=>{
      // fetch failed — try to load last known messages from localStorage
      const cached = localStorage.getItem('cobweb_messages');
      if(cached) {
        const {regular, important} = JSON.parse(cached);
        if(regular.length) MESSAGES=regular;
        if(important.length) IMPORTANT_MESSAGES=important;
      }
    });
}

 // ── Notifications ───────────────────────────────────────────
function requestNotifPermission() {
  // only ask if they haven't been asked before and the browser supports it
  if (!('Notification' in window)) return
  if (Notification.permission === 'granted') return
  if (Notification.permission === 'denied') return
  // ask once — browser remembers the answer forever
  Notification.requestPermission()
}

function sendSystemNotif(message) {
  if (!('Notification' in window)) return
  if (Notification.permission !== 'granted') return
  new Notification('The Cobweb', {
    body: message,
    icon: '/favicon.ico',
    // silent: false means it uses the phone's default notification sound
    silent: false
  })
}

 function showFirstTimeHint() {
  if (localStorage.getItem('cobweb_welcomed')) return

  const el = document.createElement('div')
  el.id = 'first-hint'
  el.style.cssText = `
    position: fixed;
    bottom: 60px;
    left: 16px;

  `

    }
  `

}
 
 // ── Glotches ────────────────────────────────────────────
 const GLITCH_CHARS = '█▓░▒#@$%&?!'
// these are the symbols that will briefly replace real characters

function glitchElement(el) {
  const original = el.textContent
  // save the original text so we can restore it

  const chars = original.split('')
  // split into individual characters so we can swap some out

  // corrupt 2-4 random characters
  const numGlitches = 2 + Math.floor(Math.random() * 3)
  for (let i = 0; i < numGlitches; i++) {
    const pos = Math.floor(Math.random() * chars.length)
    // pick a random position in the text
    chars[pos] = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]
    // replace it with a random glitch symbol
  }

  el.textContent = chars.join('')
  // put the corrupted text back into the element

  setTimeout(() => {
    el.textContent = original
    // restore original text after 80ms — just a brief flicker
  }, 200)
}

function runGlitches() {
  const messages = document.querySelectorAll('.msg.visible')
  // grab all currently visible messages on screen

  if (messages.length > 0) {
    const target = messages[Math.floor(Math.random() * messages.length)]
    // pick one at random
    glitchElement(target)
  }

  setTimeout(runGlitches, 800 + Math.random() * 2000)
  // run again in 0.8 to 2.8 seconds — random so it feels organic
}

 // ── Vision ────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyscQgjEj5yr8KmFMchhnTsHkJOtv2QXxZERFZBSYBGbKmdHKTdxTTLq2Pd8C9nfrC4/exec'
const VISION_POLL_MS = 4000
let lastVisionTs = 0
let visionFirstPoll = true
let visionDismissTimer = null

const visionOverlay = document.getElementById('vision-overlay')
const visionImg     = document.getElementById('vision-img')

function showVision(url) {
  visionImg.src = url
  visionOverlay.classList.add('active')
  visionOverlay.style.pointerEvents = 'all'
  if (navigator.vibrate) navigator.vibrate([200, 100, 200])
  if (visionDismissTimer) clearTimeout(visionDismissTimer)
  visionDismissTimer = setTimeout(dismissVision, SCREAM_DURATION_MS)
}

function dismissVision() {
  if (visionDismissTimer) { clearTimeout(visionDismissTimer); visionDismissTimer = null }
  visionOverlay.classList.remove('active')
  visionOverlay.style.pointerEvents = 'none'
  setTimeout(() => { visionImg.src = '' }, 400)
}

visionOverlay.addEventListener('click', dismissVision)

function pollVision() {
  fetch(SCRIPT_URL + '?type=vision&t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (!data.ts || !data.url) return
      if (visionFirstPoll) { lastVisionTs = data.ts; visionFirstPoll = false; return }
      if (data.ts > lastVisionTs) { lastVisionTs = data.ts; showVisionNotif(data.url) }
    })
    .catch(() => {})
}

function startVisionPoller() {
  pollVision()
  setInterval(pollVision, VISION_POLL_MS)
}

 // ── Countdown ─────────────────────────────────────────────
const COUNTDOWN_POLL_MS = 10000
let countdownTarget = 0
let countdownInterval = null
const countdownEl = document.getElementById('countdown')

function updateCountdown() {
  if (!countdownTarget) return
  const now = Date.now()
  const diff = countdownTarget - now
  if (diff <= 0) {
    countdownEl.classList.remove('active')
    countdownTarget = 0
    clearInterval(countdownInterval)
    countdownInterval = null
    return
  }
  const h = Math.floor(diff / 3600000)
  const m = Math.floor((diff % 3600000) / 60000)
  const s = Math.floor((diff % 60000) / 1000)
  document.getElementById('countdown-time').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
}

function setCountdown(targetTime, label) {
  countdownTarget = targetTime
  if (countdownInterval) clearInterval(countdownInterval)
  if (!targetTime || targetTime <= Date.now()) return
  countdownEl.classList.add('active')
  document.getElementById('countdown-label').textContent = label || ''
  updateCountdown()
  countdownInterval = setInterval(updateCountdown, 1000)
}

function pollCountdown() {
  fetch(SCRIPT_URL + '?type=countdown&t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (!data.targetTime) return
      if (data.targetTime !== countdownTarget) setCountdown(data.targetTime, data.label)
    })
    .catch(() => {})
}

function startCountdownPoller() {
  pollCountdown()
  setInterval(pollCountdown, COUNTDOWN_POLL_MS)
}

 // ── Scream History ─────────────────────────────────────────
const screamHistory = []
const MAX_HISTORY = 3

function addToHistory(message) {
  const now = new Date()
  const timeStr = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  })
  screamHistory.unshift({ message, time: timeStr })
  if (screamHistory.length > MAX_HISTORY) screamHistory.pop()
}

function renderHistory() {
  const list = document.getElementById('echoes-list')
  if (!list) return

  list.innerHTML = ''

  if (!screamHistory.length) {
    const empty = document.createElement('div')
    empty.className = 'echo-empty'
    empty.textContent = 'silence so far'
    list.appendChild(empty)
    return
  }

  screamHistory.forEach((entry, i) => {
    const div = document.createElement('div')
    div.className = 'echo-entry'

    const time = document.createElement('span')
    time.className = 'echo-time'
    time.textContent = entry.time

    const msg = document.createElement('span')
    msg.className = 'echo-msg'
    msg.textContent = entry.message

    div.appendChild(time)
    div.appendChild(msg)
    list.appendChild(div)

    // Staggered bleed-in: each entry appears slightly after the previous
    // requestAnimationFrame ensures the element is in the DOM before
    // the class is added — required for the CSS animation to fire on iOS
    const delay = i * 160
    setTimeout(() => {
      requestAnimationFrame(() => {
        div.classList.add('echo-visible')
      })
    }, delay)
  })
}

// ── Echoes Panel toggle ────────────────────────────────────
const echoesBtn      = document.getElementById('echoes-btn')
const echoesPanel    = document.getElementById('echoes-panel')
const echoesBackdrop = document.getElementById('echoes-backdrop')

function openEchoes() {
  echoesPanel.classList.add('active')
  echoesBackdrop.classList.add('active')
  echoesBtn.classList.add('active')
  echoesBtn.classList.remove('has-new')
  // Render AFTER the panel is visible so animations trigger correctly
  requestAnimationFrame(() => renderHistory())
}

function closeEchoes() {
  echoesPanel.classList.remove('active')
  echoesBackdrop.classList.remove('active')
  echoesBtn.classList.remove('active')
}

function toggleEchoes() {
  echoesPanel.classList.contains('active') ? closeEchoes() : openEchoes()
}

echoesBtn.addEventListener('click', toggleEchoes)
echoesBackdrop.addEventListener('click', closeEchoes)

function startApp() {

  setTimeout(()=>spawnMessage(),200);

 const params = new URLSearchParams(window.location.search)
