<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cobweb — QR Forge</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>

  /* ── Base Reset & Variables ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #06080a;
    --surface: #0d1117;
    --border: rgba(160,180,210,0.12);
    --text: rgba(200,215,230,0.8);
    --text-dim: rgba(140,160,180,0.45);
    --gold: rgba(220,190,130,0.7);
    --red: rgba(190,40,40,0.9);
    --red-glow: rgba(200,0,0,0.4);
    --green: rgba(40,160,80,0.4);
    --green-text: rgba(140,220,160,0.9);
  }
  html, body {
    width: 100%; min-height: 100%;
    background: var(--bg);
    font-family: 'Special Elite', monospace;
    color: var(--text);
  }

  /* ── Login Screen ── */
  #login-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; background: var(--bg);
    z-index: 100;
  }
  #login-screen h1 {
    font-family: 'Uncial Antiqua', serif;
    font-size: 22px; letter-spacing: 0.3em;
    color: var(--text-dim); text-transform: uppercase;
  }
  #login-screen p {
    font-size: 12px; letter-spacing: 0.2em;
    color: var(--text-dim); text-transform: uppercase;
  }
  #login-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Special Elite', monospace;
    font-size: 16px; letter-spacing: 0.1em;
    padding: 12px 20px; width: 260px;
    text-align: center; outline: none;
    border-radius: 2px;
  }
  #login-input:focus { border-color: rgba(160,180,210,0.35); }
  #login-btn {
    background: rgba(160,180,210,0.08);
    border: 1px solid rgba(160,180,210,0.12);
    color: rgba(140,160,180,0.45);
    font-family: 'Special Elite', monospace;
    font-size: 13px; letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 40px; cursor: pointer;
    border-radius: 2px; width: 260px;
    transition: all 0.2s ease;
  }
  #login-btn:hover { color: var(--text); border-color: rgba(160,180,210,0.25); }
  #login-error {
    font-size: 12px; letter-spacing: 0.15em;
    color: var(--red); text-transform: uppercase;
    opacity: 0; transition: opacity 0.3s;
  }
  #login-error.show { opacity: 1; }

  /* ── Main Panel ── */
  #panel { display: none; max-width: 680px; margin: 0 auto; padding: 40px 24px 80px; }

  h1.title {
    font-family: 'Uncial Antiqua', serif;
    font-size: 18px; letter-spacing: 0.35em;
    color: var(--text-dim); text-transform: uppercase;
    text-align: center; margin-bottom: 6px;
  }
  .subtitle {
    text-align: center; font-size: 11px;
    letter-spacing: 0.25em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 40px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 13px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* ── Inputs ── */
  textarea, input[type="text"], input[type="url"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Special Elite', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    border-radius: 2px;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }
  textarea { resize: vertical; min-height: 80px; }
  textarea:focus, input:focus { border-color: rgba(160,180,210,0.35); }
  label {
    display: block; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .label-note {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: none;
    margin-left: 6px;
  }

  /* ── Toggle Row ── */
  .toggle-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; cursor: pointer;
  }
  .toggle-row label { margin-bottom: 0; cursor: pointer; }
  input[type="checkbox"] {
    width: 15px; height: 15px;
    accent-color: rgba(220,190,130,0.8);
    cursor: pointer; flex-shrink: 0;
  }

  /* ── Buttons ── */
  .btn {
    width: 100%; padding: 14px;
    font-family: 'Special Elite', monospace;
    font-size: 13px; letter-spacing: 0.2em;
    text-transform: uppercase;
    border: none; border-radius: 2px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .btn-red {
    background: var(--red); color: #fff;
    box-shadow: 0 0 20px var(--red-glow);
  }
  .btn-red:hover { background: rgba(210,50,50,0.95); }
  .btn-dim {
    background: rgba(160,180,210,0.08);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-dim:hover { background: rgba(160,180,210,0.14); color: var(--text); }
  .btn-gold {
    background: rgba(180,145,60,0.15);
    color: var(--gold);
    border: 1px solid rgba(220,190,130,0.18);
  }
  .btn-gold:hover { background: rgba(180,145,60,0.25); }
  .btn-sm { width: auto; padding: 8px 16px; font-size: 11px; }

  /* ── QR Cards Grid ── */
  #qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 4px;
  }

  /* ── Individual QR Card ── */
  .qr-card {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(160,180,210,0.1);
    border-radius: 4px;
    padding: 20px 16px 16px;
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    position: relative;
    transition: border-color 0.2s ease;
  }
  .qr-card:hover { border-color: rgba(160,180,210,0.2); }

  .qr-card-label {
    font-family: 'Uncial Antiqua', serif;
    font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--gold);
    text-align: center; line-height: 1.5;
  }

  /* QR code sits on white for scannability */
  .qr-canvas-wrap {
    background: white;
    padding: 10px; border-radius: 2px;
    line-height: 0;
  }

  .qr-msg-preview {
    font-size: 11px; letter-spacing: 0.06em;
    color: var(--text-dim); text-align: center;
    font-style: italic; max-width: 200px;
    line-height: 1.5;
  }

  .qr-card-actions { display: flex; gap: 8px; width: 100%; }

  .qr-remove-btn {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none;
    color: var(--text-dim); font-size: 13px;
    cursor: pointer; padding: 4px 6px;
    opacity: 0.3; transition: opacity 0.2s;
    line-height: 1;
  }
  .qr-remove-btn:hover { opacity: 1; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center; padding: 36px;
    color: var(--text-dim); font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase;
    border: 1px dashed rgba(160,180,210,0.07);
    border-radius: 4px;
  }

  /* ── Actions Bar ── */
  #actions-bar {
    display: none; gap: 12px; margin-top: 4px;
  }
  #actions-bar.visible { display: flex; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,30,40,0.95);
    border: 1px solid var(--border);
    color: var(--text); font-size: 12px;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 12px 24px; border-radius: 2px;
    opacity: 0; transition: all 0.3s ease;
    pointer-events: none; white-space: nowrap; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green-text); }
  #toast.error   { border-color: var(--red); color: rgba(220,120,120,0.9); }

  /* ── Print Styles ── */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    /* Hide everything except the QR grid */
    #login-screen,
    .controls-area,
    #actions-bar,
    .qr-remove-btn,
    .qr-card-actions,
    h1.title, .subtitle,
    .card:not(#output-card) { display: none !important; }

    body { background: white; }
    #panel { padding: 12px; max-width: 100%; }
    #output-card { background: white; border: none; padding: 0; }
    #output-card h2 { display: none; }
    .empty-state { display: none; }

    #qr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .qr-card {
      background: white;
      border: 1px solid #ddd;
      page-break-inside: avoid;
      break-inside: avoid;
      padding: 14px 12px 12px;
    }

    .qr-card-label { color: #555; }
    .qr-msg-preview { color: #888; }
    .qr-canvas-wrap { padding: 6px; }
  }

</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <h1>The Cobweb</h1>
  <p>QR Forge — ST Access</p>
  <input id="login-input" type="password" placeholder="enter passphrase" autocomplete="off" />
  <button id="login-btn">enter</button>
  <div id="login-error">incorrect passphrase</div>
</div>

<!-- ── Main Panel ── -->
<div id="panel">
  <h1 class="title">The Cobweb</h1>
  <div class="subtitle">QR Forge — Personal Visions</div>

  <!-- ── Cobweb URL ── -->
  <div class="card controls-area">
    <h2>⚙ Cobweb URL</h2>
    <label>Your Cobweb address <span class="label-note">— set once, applies to all QR codes</span></label>
    <input type="url" id="base-url" placeholder="https://yoursite.com/cobweb/" />
    <p style="font-size:11px; color:var(--text-dim); letter-spacing:0.1em; line-height:1.6;">
      This is the URL baked into every QR code. When a player scans one, it opens this page with their personal scream embedded.
    </p>
  </div>

  <!-- ── QR Builder ── -->
  <div class="card controls-area">
    <h2>✦ Forge a Vision</h2>
    <label>Label <span class="label-note">— your ST reference, shown on the printed card</span></label>
    <input type="text" id="qr-label" placeholder="e.g. elysium mirror · player: Sarah · act 2 reveal" maxlength="80" />
    <label>Message <span class="label-note">— what the player sees when they scan</span></label>
    <textarea id="qr-msg" placeholder="what does the web show them..." maxlength="200"></textarea>
    <div id="msg-counter" style="text-align:right; font-size:11px; letter-spacing:0.15em; color:rgba(140,160,180,0.35); margin-top:-8px; margin-bottom:16px;">200</div>
    <div class="toggle-row">
      <input type="checkbox" id="show-msg-on-card" />
      <label for="show-msg-on-card">Show message text on printed card <span class="label-note">(for ST reference packs — hide if players might read the card)</span></label>
    </div>
    <button class="btn btn-red" id="forge-btn">Forge QR</button>
  </div>

  <!-- ── QR Output ── -->
  <div class="card" id="output-card">
    <h2>⊕ Forged Visions</h2>
    <div class="empty-state" id="empty-state">no visions forged yet</div>
    <div id="qr-grid"></div>
  </div>

  <!-- ── Actions Bar ── -->
  <div id="actions-bar">
    <button class="btn btn-gold" id="print-btn">Print All Cards</button>
    <button class="btn btn-dim" id="clear-btn">Clear All</button>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict'

// ── Config ─────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyscQgjEj5yr8KmFMchhnTsHkJOtv2QXxZERFZBSYBGbKmdHKTdxTTLq2Pd8C9nfrC4/exec'

// ── DOM Refs ───────────────────────────────────────────────
const loginScreen = document.getElementById('login-screen')
const loginInput  = document.getElementById('login-input')
const loginError  = document.getElementById('login-error')
const panel       = document.getElementById('panel')
const baseUrlInput = document.getElementById('base-url')
const qrMsgInput   = document.getElementById('qr-msg')
const qrLabelInput = document.getElementById('qr-label')
const msgCounter   = document.getElementById('msg-counter')
const qrGrid       = document.getElementById('qr-grid')
const emptyState   = document.getElementById('empty-state')
const actionsBar   = document.getElementById('actions-bar')

// ── Session Restore ────────────────────────────────────────
// If already logged in via the ST panel in the same session, skip login
const savedPw = sessionStorage.getItem('cobweb_st_pw')
if (savedPw) {
  attemptLogin(savedPw).then(ok => {
    if (ok) unlockPanel()
    else sessionStorage.removeItem('cobweb_st_pw')
  })
}

// ── Login Functions ────────────────────────────────────────
async function attemptLogin(password) {
  try {
    const res = await post({ type: 'scream', message: '__ping__', password, _ping: true })
    return res.error !== 'unauthorized'
  } catch {
    return false
  }
}

function unlockPanel() {
  loginScreen.style.display = 'none'
  panel.style.display = 'block'
  // Restore saved base URL from localStorage
  const savedUrl = localStorage.getItem('cobweb_qr_baseurl')
  baseUrlInput.value = savedUrl || window.location.origin + '/'
}

async function doLogin(pw) {
  if (!pw) return
  const ok = await attemptLogin(pw)
  if (!ok) {
    loginError.classList.add('show')
    loginInput.value = ''
    setTimeout(() => loginError.classList.remove('show'), 2000)
    return
  }
  sessionStorage.setItem('cobweb_st_pw', pw)
  unlockPanel()
}

loginInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(loginInput.value.trim()) })
document.getElementById('login-btn').addEventListener('click', () => doLogin(loginInput.value.trim()))

// ── Save Base URL to localStorage ─────────────────────────
baseUrlInput.addEventListener('change', () => {
  localStorage.setItem('cobweb_qr_baseurl', baseUrlInput.value.trim())
})

// ── Character Counter ──────────────────────────────────────
qrMsgInput.addEventListener('input', () => {
  const remaining = 200 - qrMsgInput.value.length
  msgCounter.textContent = remaining
  msgCounter.style.color = remaining < 40
    ? 'rgba(200,80,80,0.7)'
    : remaining < 80
    ? 'rgba(220,190,130,0.6)'
    : 'rgba(140,160,180,0.35)'
})

// ── QR Forge ───────────────────────────────────────────────
let cardCount = 0

document.getElementById('forge-btn').addEventListener('click', () => {
  const baseUrl = baseUrlInput.value.trim()
  const label   = qrLabelInput.value.trim()
  const msg     = qrMsgInput.value.trim()
  const showMsg = document.getElementById('show-msg-on-card').checked

  if (!baseUrl) return toast('set your cobweb URL first', 'error')
  if (!msg)     return toast('enter a message first', 'error')

  // Build the full scream URL
  const cleanBase = baseUrl.replace(/\/?$/, '')
  const screamUrl = cleanBase + '?scream=' + encodeURIComponent(msg)

  // ── Build card DOM ──
  cardCount++
  const card    = document.createElement('div')
  card.className = 'qr-card'

  // Remove button
  const removeBtn = document.createElement('button')
  removeBtn.className = 'qr-remove-btn'
  removeBtn.textContent = '✕'
  removeBtn.title = 'remove this card'
  removeBtn.addEventListener('click', () => {
    card.remove()
    updateActionsBar()
  })

  // Label
  const labelEl = document.createElement('div')
  labelEl.className = 'qr-card-label'
  labelEl.textContent = label || 'unnamed vision'

  // QR code container (white background for scannability)
  const qrWrap = document.createElement('div')
  qrWrap.className = 'qr-canvas-wrap'
  const qrEl = document.createElement('div')
  qrWrap.appendChild(qrEl)

  // Optional message preview
  const msgPreview = document.createElement('div')
  msgPreview.className = 'qr-msg-preview'
  if (showMsg) msgPreview.textContent = '\u201c' + msg + '\u201d'

  // Copy URL button
  const copyBtn = document.createElement('button')
  copyBtn.className = 'btn btn-dim btn-sm'
  copyBtn.textContent = 'copy url'
  copyBtn.style.flex = '1'
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(screamUrl)
      .then(() => toast('url copied', 'success'))
      .catch(() => toast('copy failed', 'error'))
  })

  const actionsRow = document.createElement('div')
  actionsRow.className = 'qr-card-actions'
  actionsRow.appendChild(copyBtn)

  // Assemble card
  card.appendChild(removeBtn)
  card.appendChild(labelEl)
  card.appendChild(qrWrap)
  if (showMsg) card.appendChild(msgPreview)
  card.appendChild(actionsRow)

  // Add to grid
  emptyState.style.display = 'none'
  qrGrid.appendChild(card)

// Generate QR code via API — handles all characters reliably
const qrImg = document.createElement('img')
qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(screamUrl)
qrImg.width = 180
qrImg.height = 180
qrImg.alt = 'QR code'
qrEl.appendChild(qrImg)
  // Reset inputs
  qrLabelInput.value = ''
  qrMsgInput.value = ''
  msgCounter.textContent = '200'
  msgCounter.style.color = 'rgba(140,160,180,0.35)'

  updateActionsBar()
  toast('vision forged', 'success')
})

// ── Actions Bar Visibility ─────────────────────────────────
function updateActionsBar() {
  actionsBar.classList.toggle('visible', qrGrid.children.length > 0)
}

// ── Print All ─────────────────────────────────────────────
document.getElementById('print-btn').addEventListener('click', () => window.print())

// ── Clear All ─────────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', () => {
  qrGrid.innerHTML = ''
  emptyState.style.display = 'block'
  updateActionsBar()
})

// ── Helpers ────────────────────────────────────────────────
async function post(data) {
  const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) })
  return res.json()
}

let toastTimer
function toast(msg, type = '') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'show ' + (type || '')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => { el.className = '' }, 3000)
}
</script>
</body>
</html>
